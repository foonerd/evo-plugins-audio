schema_version: "1.0"
plugin: org.evoframework.distribution.audio
owner: evo-device-audio
isolation: oop

# Reference-distribution-bootstrap record for evo-device-audio.
#
# This record describes what the distribution provisions at install
# time: the steward systemd unit + supplementary group memberships
# + polkit drop-ins satisfying the union of in-process plugin needs
# bundled with this distribution.
#
# Identity policy: appliance-class default — the steward runs as the
# operator's first user (uid >= 1000), determined at install time by
# the installer reading `getent passwd 1000` (or equivalent) and
# templating the resolved name into the systemd unit. Vendor
# distributions that pre-bake a service user override by pinning
# `User:` explicitly. Identity is mutable post-install via an
# operator-issued migration verb that lands with the dynamic
# provisioning-lifecycle implementation in a subsequent framework
# release.
#
# Bundled in-process plugins covered by this provisioning:
#   - org.evoframework.metadata.local (filesystem/library + state)
#   - org.evoframework.artwork.local (filesystem/library + state)
#   - org.evoframework.composition.alsa (alsa/control via `audio` group)
#   - org.evoframework.playback.mpd (mpd binary + mpd.service control socket)
#   - org.evoframework.network.nm (NetworkManager via D-Bus + polkit + `netdev` group)

capability_intent:
  - id: bootstrap_steward_unit
    need: install the steward systemd unit at /etc/systemd/system/evo.service with the resolved User= value and the union of supplementary groups required by the bundled in-process plugin set.
    access_path: filesystem/system
    failure_mode: distribution install fails; structured installer error.
  - id: bootstrap_state_directory
    need: create /var/lib/evo with ownership matching the steward identity, and seed default catalogue + trust roots under /etc/evo.
    access_path: filesystem/system
    failure_mode: distribution install fails; structured installer error.
  - id: bootstrap_polkit_drops
    need: install polkit drop-ins under /etc/polkit-1/rules.d/ granting the steward identity authority for NetworkManager (and any other action sets required by bundled plugins).
    access_path: polkit/policy
    failure_mode: bundled plugins requiring polkit grants admit but degrade at runtime; structured event names the missing action set.
  - id: bootstrap_mpd_sudoers
    need: install /etc/sudoers.d/evo-mpd-restart granting the steward service user the exact NOPASSWD command `/usr/bin/systemctl restart mpd` (only). The bootstrap script substitutes the resolved service user into the template at dist/sudoers.d/evo-mpd-restart.in, validates via visudo -c, and installs at mode 0440 root:root. Required for the playback.mpd plugin's fragment-writer worker to recycle MPD after every audio_output rewrite without interactive auth.
    access_path: filesystem/system
    failure_mode: bundled playback.mpd plugin admits; restart leg resolves to NoOp (sudo refusal would otherwise pollute the journal with "Interactive authentication required"); fragment file is rewritten on disk on every route change but MPD does not pick it up until next manual restart.
  - id: bootstrap_mpd_fragment_path
    need: seed /etc/evo/mpd.conf owned by the steward service user (mode 0644) so the playback.mpd plugin's fragment-writer worker can rewrite the audio_output block on every route change without escalation.
    access_path: filesystem/system
    failure_mode: bundled playback.mpd plugin admits; fragment-writer worker publishes Failed status on first write attempt; previous fragment file (if any) is preserved; playback continues on prior MPD configuration.
  - id: bootstrap_evo_service_drop_ins
    need: install systemd drop-ins under /etc/systemd/system/evo.service.d/ that (a) widen StateDirectoryMode to 0755 so external services like MPD can traverse /var/lib/evo, and (b) relax the framework's reference hardening to permit playback.mpd's fragment write + sudo escalation (ReadWritePaths=/etc/evo, NoNewPrivileges=no, Environment=EVO_SYSTEMCTL).
    access_path: filesystem/system
    failure_mode: distribution install fails; structured installer error; framework's reference hardening posture remains in effect (playback.mpd's privileged legs resolve to NoOp).

required_binaries:
  - name: nmcli
    min_version: "1.30"
    failure_mode: org.evoframework.network.nm refuses to admit; structured event.
  - name: mpd
    failure_mode: org.evoframework.playback.mpd refuses to admit; structured event.

required_kernel_modules:
  - snd_pcm

required_system_services:
  - NetworkManager.service
  - mpd.service

verification:
  commands:
    - "test -d /var/lib/evo"
    - "test -r /etc/evo"
    - "test -d /run/evo"
    - "test -d /proc/asound"
  expected:
    - steward state directory exists as steward identity (writable)
    - steward config directory exists (readable)
    - steward run directory exists for the wire socket
    - ALSA proc tree present (kernel snd subsystem loaded)

host_provisioning:
  debian:
    systemd:
      # User= resolved at install time per the appliance-class
      # identity policy (operator's first user; `getent passwd`
      # picks uid >= 1000). Vendor distributions overriding may
      # pin a literal name here.
      SupplementaryGroups: [audio, netdev]
      CapabilityBoundingSet: []
      AmbientCapabilities: []
      ProtectSystem: strict
      ProtectHome: "yes"
      # /etc/evo writable so the playback.mpd plugin's fragment-
      # writer worker can rewrite /etc/evo/mpd.conf on every
      # route change without sudo. The bootstrap script chowns
      # the fragment file to the service user at install time.
      # /var/lib/evo + /run/evo are the framework defaults.
      ReadWritePaths:
        - /var/lib/evo
        - /run/evo
        - /etc/evo
      ReadOnlyPaths: []
      # NoNewPrivileges relaxed distribution-wide so the
      # playback.mpd plugin can dispatch `sudo -n systemctl
      # restart mpd` against the narrow NOPASSWD drop-in
      # installed at /etc/sudoers.d/evo-mpd-restart. Sudo is
      # setuid; NoNewPrivileges=true would block the escalation.
      # The relaxation is intentional + scoped to a single
      # NOPASSWD command (no general escalation surface).
      NoNewPrivileges: false
    polkit:
      policy_file: 50-evo-org.evoframework.distribution.audio.rules
      required_actions:
        - "org.freedesktop.NetworkManager.*"
    capabilities: []
    # Narrow NOPASSWD entries the bootstrap script installs as
    # individual drop-ins under /etc/sudoers.d/. Each entry is
    # one binary + one verb + one unit (no wildcards, no ALL).
    # The bootstrap script substitutes <user> with the resolved
    # service user at install time.
    sudoers:
      - "<user> ALL=(root) NOPASSWD: /usr/bin/systemctl restart mpd"
