schema_version: "1.0"
plugin: org.evoframework.playback.mpd
owner: evo-device-audio
isolation: in_process

# In-process plugin loaded into the steward identity per
# manifest.toml (transport = "in-process"). Privileges declared here
# union into the steward record at admission. Per-distribution
# host_provisioning lives in evo-device-audio/PRIVILEGES.yaml — that
# record ensures the mpd binary is on PATH and that the steward
# identity has read access to the mpd control socket / TCP port.

capability_intent:
  - id: mpd_control
    need: connect to the local Music Player Daemon over its TCP port (default 6600) or Unix socket to issue play/pause/seek/queue/status commands.
    access_path: mpd/protocol
    failure_mode: respond with playback unavailable; structured event identifies missing MPD; no panic.
  - id: media_library_path_resolution
    need: resolve relative paths emitted by MPD against declared media library roots so the playback plugin can correlate with metadata + artwork plugins.
    access_path: filesystem/library
    failure_mode: degrade to MPD-only paths (no library cross-reference); structured event; no panic.
  - id: mpd_fragment_write
    need: write the framework-controlled `audio_output` block to the configured fragment path (default `/etc/evo/mpd.conf`) so MPD picks up the substrate-negotiated ALSA device + format on its next start. The bootstrap script chowns the fragment path to the steward service user at install time so the running plugin writes directly without escalation.
    access_path: filesystem/system
    failure_mode: route-change fragment-writer worker publishes FragmentWorkerStatus::Failed with an operator-readable reason naming the bootstrap remedy; the previous fragment file is left in place; playback continues with the prior audio_output configuration; no panic.
  - id: mpd_systemctl_restart
    need: signal `systemctl restart mpd` after every fragment rewrite so MPD re-reads its audio_output configuration and applies the framework-negotiated device + format. When running as root, exec systemctl directly; when running as a non-root service user, dispatch via `sudo -n` against a narrow NOPASSWD drop-in shipped by the distribution's bootstrap. The plugin selects the strategy via the framework's CapabilityResolution for this intent, or falls back to /proc/self/status EUID detection when the framework's preflight runner has not yet populated the map.
    access_path: sudoers/command
    failure_mode: AutoMpdRestarter resolves to the no-op variant; fragment file is on disk but MPD does not pick it up until next manual restart; route-change worker publishes Failed status with the framework's remedy string; playback continues on the prior MPD configuration; no panic.

required_binaries:
  - name: mpd
    failure_mode: refuse to admit; structured admission error names the missing binary.

required_kernel_modules: []

required_system_services:
  - mpd.service

verification:
  commands:
    - "test -e /var/lib/evo"
    - "test -d /run"
  expected:
    - state directory exists
    - run directory exists for the mpd control socket (when MPD configured for Unix-socket control)

host_provisioning: {}
