# Catalogue extension for the audio domain.
#
# Distributions admitting the evo-device-audio plugin set
# include this rack + subjects + relation predicates in
# their catalogue. It is NOT a complete catalogue on its
# own — it omits `schema_version` and any framework-tier
# rack the distribution chooses to admit alongside (e.g.
# the validation distribution's `acceptance` rack); the
# distribution composes a full catalogue from this and
# whatever else it admits.
#
# The audio rack hosts two shelves: composition (audio
# data plane composition stage; substrate-aware respondent)
# and playback (warden + source for MPD-backed playback).
# The subject + relation declarations cover the
# subject-graph emission the audio playback warden makes
# on every song change (track + album subjects with the
# `album_of` relation, and its `tracks_of` inverse).
#
# Reference plugins that stock these shelves live in
# `evo-device-audio/plugins/` and are admitted in-process
# by the `evo-device-audio` steward binary
# (`crates/evo-device-audio-distribution`). Vendor
# distributions that swap one or more reference plugins for
# their own implementations carry a different catalogue
# fragment that declares the same shelves with the vendor's
# plugin set.

[[racks]]
name = "audio"
family = "domain"
kinds = ["registrar"]
charter = """
Audio data plane reference: substrate-aware composition + \
MPD-backed playback warden, owning the mpd-path URI scheme. \
"""

[[racks.shelves]]
name = "composition"
shape = 2
description = """
Audio data plane composition stage. Substrate-aware \
respondent; declares typed [capabilities.composition] modes; \
consumes LoadContext::audio_routing for endpoint resolution.
"""

[[racks.shelves]]
name = "playback"
shape = 1
description = """
Audio playback warden. Owns playback custody; handles \
course_correct verbs; also exposes a respondent surface \
for source-verb dispatches (play_now) targeting the \
mpd-path URI scheme.
"""

[[racks.shelves]]
name = "delivery"
shape = 2
description = """
Audio delivery stage. Owns the modular ALSA pipeline \
(pcm.evo defined in /etc/asound.conf); declares the \
WriteEndpoint other audio-producing plugins write into. \
Exposes a respondent surface for operator-facing hardware \
inspection (delivery.probe_hardware / list_cards / list_mixers \
/ active_endpoint) consumed by the playback.options plugin to \
drive output-device selection.
"""

[[racks.shelves]]
name = "options"
shape = 1
description = """
Operator-facing playback settings. Persists audiophile \
preferences across steward restarts (resampling / mixer_type \
/ DOP / output_device / volume_normalization). Emits \
`Happening::PluginEvent` with event_type `audio.options.changed` \
on every setter so the delivery plugin re-renders the modular \
ALSA pipeline and the UI surfaces stay coherent.
"""

[[racks.shelves]]
name = "multiroom"
shape = 1
description = """
Multi-room audio-frame fan-out + receiver-side render plugin. \
Bridges the local audio chain to the framework's audio-plane \
TCP transport. Source-host role: capture from the local audio \
chain, encode into AudioFrame envelopes, fan to receivers via \
the framework's audio-plane handle. Receiver role: subscribe \
to incoming frames, decode, render to local ALSA at the \
scheduling target the envelope's presentation_time_ms declares. \
Role flips dynamically per the framework's source-host election.
"""

[[racks]]
name = "networking"
family = "domain"
kinds = ["registrar"]
charter = """
Host networking surface: NetworkManager-backed connection \
control + Wi-Fi radio + connectivity-check + captive-portal \
helpers. One shelf for the link-layer operator surface; \
additional shelves (link aggregation, VPN, etc.) attach as \
their plugins land.
"""

[[racks.shelves]]
name = "link"
shape = 1
description = """
Host link-layer respondent. Operator-facing networking \
verbs (status / scan / intent.get|set|apply / captive.* / \
security.* / flight_mode.get|set) for the
NetworkManager-backed reference implementation. Plugin \
dispatches every nmcli invocation through a privilege \
composite that the framework's preflight runner resolves \
at admission (direct under root, sudo -n under a non-root \
service user).
"""

# Subject types the audio playback warden announces on
# every song change. The track subject is keyed by
# `mpd-path` URI scheme; the album subject is keyed by
# `mpd-album` and carries `"{artist}|{album}"` value form.
[[subjects]]
name = "track"

[[subjects]]
name = "album"

# Subject type the playback.options plugin announces as a
# durable projection of the operator's audiophile-grade
# settings (resampling / mixer_type / dop / output_device /
# volume_normalization). Other plugins (playback.mpd's
# mixer-mode reactor, future UI plugins) subscribe to this
# subject's state changes via the framework's
# SubjectStateSubscriber to react to operator updates
# without restarting the steward. The plugin uses
# `evo.audio.options:settings` as the canonical addressing.
[[subjects]]
name = "audio_options_settings"

# Relation predicates between the audio domain's subject
# types. The audio playback warden asserts album_of from
# the playing track to its album on every song change;
# library / UI views consume the inverse tracks_of to
# enumerate album contents.
[[relation]]
predicate = "album_of"
description = "track belongs to album"
source_type = "track"
target_type = "album"
source_cardinality = "at_most_one"
target_cardinality = "many"
inverse = "tracks_of"

[[relation]]
predicate = "tracks_of"
description = "album contains tracks"
source_type = "album"
target_type = "track"
source_cardinality = "many"
target_cardinality = "at_most_one"
inverse = "album_of"
