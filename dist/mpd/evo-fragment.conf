# MPD audio_output fragment for evo-device-audio.
#
# Drop this file at `/etc/evo/mpd.conf` and add
# `include_optional /etc/evo/mpd.conf` to `/etc/mpd.conf`
# so MPD picks up the framework-curated audio_output block.
# The reference value below routes MPD's output directly to
# the I-Sabre Q2M DAC at `hw:2,0` — the reference target hardware
# wired up at the v0.1.13 verification milestone. Vendor
# distributions retarget at deploy time per their hardware.
#
# This fragment is the verification-static form. The
# substrate-aware shape (playback.mpd's F3 fragment writer)
# generates this block dynamically from the framework's
# negotiated WriteEndpoint per topology and reloads MPD on
# every route change. Until F3 lands, the operator's chosen
# DAC sits in this static file.
#
# music_directory is set in the main `/etc/mpd.conf` (not
# here) — pointing at `/var/lib/evo/music/` per the
# distribution's bring-up procedure.

audio_output {
    type            "alsa"
    name            "evo-device-audio"
    device          "hw:2,0"
    mixer_type      "software"
}
