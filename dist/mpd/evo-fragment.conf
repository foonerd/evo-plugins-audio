# MPD audio_output fragment for evo-device-audio.
#
# Drop this file at `/etc/evo/mpd.conf` and add
# `include_optional /etc/evo/mpd.conf` to `/etc/mpd.conf`
# so MPD picks up the framework-curated audio_output block.
#
# Modular-ALSA pipeline binding: MPD writes to `pcm.evo` — the
# single entry point defined in `/etc/asound.conf` (shipped by
# this distribution's bootstrap). The pipeline terminates at
# the operator's chosen DAC via the kernel-stable
# `hw:CARD=...,DEV=0` form. Format negotiation, future
# resampler / EQ / room-correction / peppyalsa stages all get
# inserted into the asound chain at the asound layer — MPD's
# config stays unchanged. MPD does not own ALSA-specific
# knowledge; the asound chain owns the audio pipeline
# composition.
#
# This fragment is the boot-time form (used before the audio
# data plane reconciliation engine publishes a topology). The
# substrate-aware shape (playback.mpd's F3 fragment writer)
# rewrites this file dynamically from the framework's
# negotiated WriteEndpoint per topology and reloads MPD on
# every route change. Until the framework publishes a
# topology, this static fragment carries the modular ALSA
# pipeline entry point so MPD has a valid audio_output at boot.
#
# music_directory is set in the main `/etc/mpd.conf` (not
# here) — pointing at `/var/lib/evo/music/` per the
# distribution's bring-up procedure.

audio_output {
    type            "alsa"
    name            "evo-device-audio"
    device          "evo"
    mixer_type      "software"
}
