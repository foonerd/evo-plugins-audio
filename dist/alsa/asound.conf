# Modular ALSA pipeline definition for evo-device-audio.
# Installed at `/etc/asound.conf` by the distribution's
# bootstrap script. ALSA reads `/etc/asound.conf` (system-wide)
# at every PCM open; no include glob needed — this is the
# canonical place for the system's audio pipeline definition.
# Vendor distributions that prefer to layer on top of a stock
# distro's asound.conf instead manage the merge in their own
# bootstrap.
#
# `pcm.evo` is the single entry point every audio-producing
# plugin in the evo-device-audio distribution writes to. MPD's
# `audio_output { device "evo" }` resolves here; future
# pipeline stages (resampler, EQ, room correction, peppyalsa
# visualisation, etc.) get inserted into this chain without
# touching MPD's config or any plugin code.
#
# The chain shape is intentionally minimal in this build:
#
#   evo → plug → hw:CARD=DAC,DEV=0
#
# `plug` is ALSA's automatic format-conversion plugin — it
# negotiates between the format MPD decoded the source to
# (typically 44.1kHz/16bit/2ch for MP3) and the format the
# hardware accepts. Without it, MPD's direct write to
# `hw:CARD=DAC,DEV=0` returns ENOTSUPP whenever the hardware's
# active format doesn't match the source. With it, MP3, FLAC,
# WAV, and DSD-over-PCM all play through the same pipeline.
#
# `hw:CARD=DAC,DEV=0` uses the kernel-stable card NAME
# (`DAC` = the I-Sabre Q2M's ALSA card name) rather than the
# numeric index (`hw:2,0`). Card indices reorder across reboots
# when USB DACs are hot-plugged; using the name keeps the
# pipeline pinned to the same hardware regardless of probe
# order.
#
# Replacing the hardware target: operators editing this file
# replace the `card "DAC"` line with their DAC's card name
# (visible via `aplay -L`). Vendor distributions shipping a
# different reference DAC adjust this template before install.
#
# Pipeline-stage insertion (future chunks): each pipeline
# stage (resampler, soxr, EQ, room correction, peppyalsa)
# gets its own asound drop-in at
# /etc/asound.d/NN-evo-<stage>.conf (NN < 99 so it loads
# before this file) defining `pcm.evo_<stage>`, and `pcm.evo`
# then chains through them. The delivery.alsa plugin owns the
# stage-chain composition logic; this file is the trailing
# terminus that always delivers to hardware.

pcm.evo {
    type plug
    slave {
        pcm {
            type hw
            card "DAC"
            device 0
        }
    }
    hint {
        show on
        description "evo-device-audio modular ALSA pipeline"
    }
}

ctl.evo {
    type hw
    card "DAC"
}
