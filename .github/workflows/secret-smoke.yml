# Smoke test for the repository secrets this CI consumes.
# Triggered manually after secret provisioning or rotation to confirm:
#   - ARTEFACTS_PUSH_TOKEN exists and has push access on the scoped
#     artefacts repository.
#   - PLUGIN_SIGNING_KEY_PEM exists and signs payloads that verify
#     against the committed public key.
# No real publish occurs; no bytes change anywhere.
name: secret-smoke

"on":
  workflow_dispatch: {}

jobs:
  artefacts-push-token:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm ARTEFACTS_PUSH_TOKEN has push access on evo-device-audio-artefacts
        env:
          GH_TOKEN: ${{ secrets.ARTEFACTS_PUSH_TOKEN }}
        run: |
          set -e
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ARTEFACTS_PUSH_TOKEN is empty or unset"
            exit 1
          fi
          PUSH=$(gh api repos/foonerd/evo-device-audio-artefacts --jq '.permissions.push')
          if [ "$PUSH" != "true" ]; then
            echo "::error::Expected .permissions.push == true; got: ${PUSH}"
            exit 1
          fi
          echo "OK: ARTEFACTS_PUSH_TOKEN has push access on evo-device-audio-artefacts"

  signing-key:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v5
      - name: Confirm PLUGIN_SIGNING_KEY_PEM signs and verifies
        env:
          PLUGIN_SIGNING_KEY_PEM: ${{ secrets.PLUGIN_SIGNING_KEY_PEM }}
        run: |
          set -e
          if [ -z "$PLUGIN_SIGNING_KEY_PEM" ]; then
            echo "::error::PLUGIN_SIGNING_KEY_PEM is empty or unset"
            exit 1
          fi
          umask 077
          printenv PLUGIN_SIGNING_KEY_PEM > /tmp/key.pem
          echo "secret-smoke payload $(date -u +%FT%TZ) ${RANDOM}" > /tmp/payload.txt
          openssl pkeyutl -sign \
              -inkey /tmp/key.pem -rawin \
              -in /tmp/payload.txt \
              -out /tmp/payload.sig
          openssl pkeyutl -verify \
              -pubin -inkey keys/commons-plugin-signing-public.pem \
              -rawin -in /tmp/payload.txt \
              -sigfile /tmp/payload.sig
          shred -u /tmp/key.pem /tmp/payload.txt /tmp/payload.sig
          echo "OK: PLUGIN_SIGNING_KEY_PEM signs and verifies against keys/commons-plugin-signing-public.pem"
