# Promote: move a channel pointer to a (piece, version) that is
# already published in pieces/. No rebuild; no signing of the piece
# itself. The channel-pointer file is signed with the commons key
# so consumers can verify which version a channel points at.
#
# Format is v0. When `evo-core/docs/engineering/RELEASE_PLANE.md`
# lands per ADR-0027 / GAPS [30], the channel-pointer file shape
# will reshape to match; the migration is in-place.
name: promote

"on":
  workflow_dispatch:
    inputs:
      piece:
        description: "Piece name (e.g. org.evoframework.playback.mpd)"
        type: string
        required: true
      version:
        description: "Version already published under pieces/<piece>/<version>/"
        type: string
        required: true
      channel:
        description: "Target channel"
        type: choice
        options: [dev, test, prod]
        required: true

env:
  ARTEFACTS_REPO: foonerd/evo-plugins-audio-artefacts
  COMMIT_USER: evo-plugins-audio CI
  COMMIT_EMAIL: ci@evoframework.org

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Promote channel pointer
        env:
          PLUGIN_SIGNING_KEY_PEM: ${{ secrets.PLUGIN_SIGNING_KEY_PEM }}
          GH_TOKEN: ${{ secrets.ARTEFACTS_PUSH_TOKEN }}
          PIECE: ${{ inputs.piece }}
          VERSION: ${{ inputs.version }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          set -e
          if [ -z "$PLUGIN_SIGNING_KEY_PEM" ]; then
            echo "::error::PLUGIN_SIGNING_KEY_PEM is empty or unset"
            exit 1
          fi
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::ARTEFACTS_PUSH_TOKEN is empty or unset"
            exit 1
          fi
          umask 077
          printenv PLUGIN_SIGNING_KEY_PEM > /tmp/key.pem

          git config --global user.name "${COMMIT_USER}"
          git config --global user.email "${COMMIT_EMAIL}"

          ART=/tmp/artefacts
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${ARTEFACTS_REPO}.git" "$ART"
          cd "$ART"

          if [ ! -d "pieces/${PIECE}/${VERSION}" ]; then
            echo "::error::pieces/${PIECE}/${VERSION} not found in ${ARTEFACTS_REPO}; cannot promote a version that has not been published"
            exit 1
          fi

          mkdir -p channels
          CFILE="channels/${CHANNEL}.toml"
          UPDATED_AT=$(date -u +%FT%TZ)

          python3 "$GITHUB_WORKSPACE/.github/workflows/promote_channel_pointer.py" \
              "$CFILE" "$PIECE" "$VERSION" "$CHANNEL" "$UPDATED_AT"

          openssl pkeyutl -sign \
              -inkey /tmp/key.pem -rawin \
              -in "$CFILE" \
              -out "${CFILE%.toml}.sig"

          shred -u /tmp/key.pem

          git add channels/
          MSG="promote: ${PIECE} ${VERSION} -> ${CHANNEL}"
          git commit -m "$MSG"
          git push origin main
          echo "Promoted: $MSG"
